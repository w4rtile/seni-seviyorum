<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Romantic Animation</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            background-color: #f9f3f7;\n            font-family: Arial, sans-serif;\n        }\n        .button {\n            padding: 10px 20px;\n            margin: 10px;\n            border: none;\n            border-radius: 5px;\n            cursor: pointer;\n            transition: all 0.3s ease;\n            font-size: 16px;\n        }\n        .button1 {\n            background-color: #f39c12;\n            color: white;\n        }\n        .button2 {\n            background-color: #e74c3c;\n            color: white;\n        }\n        .expanding {\n            width: 0;\n            height: 50px;\n            overflow: hidden;\n            color: white;\n            transition: width 0.5s;\n        }\n        .button-container:hover .expanding {\n            width: 200px;\n        }\n    </style>\n</head>\n<body>\n    <div class="button-container">\n        <button class="button button1">Love</button>\n        <div class="expanding">You make my heart race!</div>\n    </div>\n    <div class="button-container">\n        <button class="button button2">Kiss</button>\n        <div class="expanding">To my beautiful soulmate!</div>\n    </div>\n</body>\n</html>
