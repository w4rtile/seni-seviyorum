<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aşkım ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        .title {
            font-size: 3em;
            color: white;
            margin-bottom: 2rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            padding: 2rem;
        }

        .button-container {
            position: relative;
            cursor: pointer;
        }

        .button {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            color: white;
        }

        .button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.3);
            transition: left 0.3s ease;
        }

        .button:hover::before {
            left: 100%;
        }

        .button1 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .button1:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(245, 87, 108, 0.4);
        }

        .button2 {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .button2:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(250, 112, 154, 0.4);
        }

        .expanding {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: #764ba2;
            padding: 12px 20px;
            border-radius: 20px;
            white-space: nowrap;
            opacity: 0;
            transform: translateX(-50%) translateY(10px);
            transition: all 0.3s ease;
            font-weight: 500;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .button-container:hover .expanding {
            opacity: 1;
            transform: translateX(-50%) translateY(0px);
        }

        .heart {
            display: inline-block;
            animation: heartbeat 1.2s ease-in-out infinite;
            margin: 0 5px;
        }

        @keyframes heartbeat {
            0%, 100% {
                transform: scale(1);
            }
            25% {
                transform: scale(1.3);
            }
        }

        @media (max-width: 768px) {
            .button-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }

            .title {
                font-size: 2em;
            }

            .button {
                padding: 12px 25px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title"><span class="heart">❤️</span> Seni Seviyorum <span class="heart">❤️</span></h1>
        <div class="button-grid">
            <div class="button-container">
                <button class="button button1">💕 Aşk</button>
                <div class="expanding">Kalbim senin için çarpıyor!</div>
            </div>
            <div class="button-container">
                <button class="button button2">💋 Öpüş</button>
                <div class="expanding">Benim güzel yarımyoluma!</div>
            </div>
        </div>
    </div>
</body>
</html>
